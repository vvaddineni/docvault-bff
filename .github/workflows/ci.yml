name: BFF CI/CD

on:
  push:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/vvaddineni/docvault-bff:latest
            ghcr.io/vvaddineni/docvault-bff:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: docvault-bff
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ghcr.io/vvaddineni/docvault-bff:${{ github.sha }}
          registryUrl: ghcr.io
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GHCR_TOKEN }}

      - name: Set service URLs on BFF Container App
        run: |
          az containerapp update \
            --name docvault-bff \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --set-env-vars \
              DOCUMENT_SERVICE_URL=${{ secrets.DOCUMENT_SERVICE_URL }} \
              SEARCH_SERVICE_URL=${{ secrets.SEARCH_SERVICE_URL }}
